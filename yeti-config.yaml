# Yeti Server Configuration
# Only override what you need — missing fields use sensible defaults.
# Root directory is set in ~/.yeti/settings.toml (from yeti init).
# Full reference: https://yetirocks.com/documentation/reference/server-config.html

environment: production

http:
  port: 443

storage:
  mode: embedded

logging:
  level: info

tls:
  autoGenerate: true

# Environment variables for extensions (OAuth, JWT, encryption).
# Real environment variables take precedence over values here.
# env:
#   GITHUB_CLIENT_ID: ""
#   GITHUB_CLIENT_SECRET: ""
#   JWT_SECRET: ""

# Applications to deploy (cloned by the GitHub Action, not parsed by Yeti)
applications:
  - https://github.com/yetirocks/www
  - https://github.com/yetirocks/documentation
  - https://github.com/yetirocks/demo-basic
  - https://github.com/yetirocks/demo-fiql
  - https://github.com/yetirocks/demo-graphql
  - https://github.com/yetirocks/demo-realtime
  - https://github.com/yetirocks/demo-vector
  - https://github.com/yetirocks/demo-authentication
