name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  YETI_BASE_URL: https://yeti-releases.us-east-1.linodeobjects.com/latest

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download yeti binary
        run: |
          curl -sSL -o yeti "$YETI_BASE_URL/yeti-linux-x86_64"
          chmod +x yeti
          ./yeti --version

          # yeti-core source (for plugin compilation on server)
          curl -sSfL -o yeti-core-source.tar.gz "$YETI_BASE_URL/yeti-core-source.tar.gz" || echo "Warning: yeti-core source not available"

      - name: Clone applications
        run: |
          mkdir -p applications
          APPS=$(grep -A100 '^applications:' yeti-config.yaml | grep '^\s*-' | sed 's/^\s*-\s*//')
          for url in $APPS; do
            app_name=$(basename "$url" .git)
            echo "Cloning $app_name..."
            git clone --depth 1 "$url" "applications/$app_name" || echo "Warning: Failed to clone $app_name"
          done
          ls applications/

      - name: Install build tools
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Build application frontends
        run: |
          for app_dir in applications/*/; do
            app_name=$(basename "$app_dir")
            config="$app_dir/config.yaml"
            [ -f "$config" ] || continue

            build_cmd=$(grep -A2 'build:' "$config" | grep 'command:' | sed 's/.*command:\s*//')
            source_dir=$(grep -A2 'build:' "$config" | grep 'sourceDir:' | sed 's/.*sourceDir:\s*//')
            [ -n "$build_cmd" ] && [ -d "$app_dir/$source_dir" ] || continue

            echo "Building $app_name ($build_cmd)..."
            cd "$app_dir/$source_dir"
            if echo "$build_cmd" | grep -q "npm"; then
              npm ci --silent 2>&1 | tail -1
            fi
            $build_cmd 2>&1 | tail -3
            cd - > /dev/null
            echo "  ✓ $app_name built"
          done

      - name: Package
        run: |
          mkdir -p deploy
          cp yeti deploy/
          cp yeti-config.yaml deploy/
          cp -r applications deploy/

          # Include yeti-core source for server-side plugin compilation
          if [ -f yeti-core-source.tar.gz ]; then
            mkdir -p deploy/yeti-core-source
            tar xzf yeti-core-source.tar.gz -C deploy/yeti-core-source --strip-components=1
          fi

          # Clean up source artifacts
          find deploy/applications -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          find deploy/applications -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
          find deploy/applications -name "source" -type d -exec rm -rf {} + 2>/dev/null || true

          tar czf deploy.tar.gz -C deploy .
          echo "Package size: $(du -h deploy.tar.gz | cut -f1)"

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@$DEPLOY_HOST"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          $SCP deploy.tar.gz "root@$DEPLOY_HOST:/tmp/deploy.tar.gz"

          $SSH "ADMIN_PASSWORD=$ADMIN_PASSWORD bash -s" << 'REMOTE'
            set -e

            systemctl stop yeti 2>/dev/null || true

            mkdir -p /opt/yeti
            tar xzf /tmp/deploy.tar.gz -C /opt/yeti
            rm /tmp/deploy.tar.gz

            # Clear stale plugin cache (prevents ABI mismatch SEGV)
            rm -rf /opt/yeti/cache/builds

            # Ensure Rust toolchain is installed
            if ! command -v cargo &>/dev/null; then
              echo "Installing Rust toolchain..."
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            fi
            source "$HOME/.cargo/env" 2>/dev/null || true

            # Ensure system deps for RocksDB
            if ! dpkg -l libclang-dev &>/dev/null 2>&1; then
              apt-get update -qq
              apt-get install -y -qq libclang-dev llvm-dev > /dev/null 2>&1
            fi

            # Initialize if needed
            NEEDS_INIT=false
            if [ ! -f /root/.yeti/settings.toml ]; then
              NEEDS_INIT=true
            elif ! grep -q '/opt/yeti' /root/.yeti/settings.toml; then
              NEEDS_INIT=true
              rm -f /root/.yeti/settings.toml
            fi

            if [ "$NEEDS_INIT" = true ]; then
              echo "Initializing Yeti..."
              /opt/yeti/yeti --init-only --dir /opt/yeti --admin-password "$ADMIN_PASSWORD" --agree-to-terms
            fi

            cat > /etc/systemd/system/yeti.service << 'SERVICE'
          [Unit]
          Description=Yeti Application Platform
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/yeti
          Environment="PATH=/root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="YETI_CORE_PATH=/opt/yeti/yeti-core-source"
          ExecStart=/opt/yeti/yeti -f
          Restart=always
          RestartSec=5
          LimitNOFILE=65536
          AmbientCapabilities=CAP_NET_BIND_SERVICE

          [Install]
          WantedBy=multi-user.target
          SERVICE
            systemctl daemon-reload
            systemctl enable yeti
            systemctl start yeti

            # Plugins compile on first start (~5-10 min)
            echo "Waiting for Yeti to start (plugins compile on first boot)..."
            for i in $(seq 1 180); do
              sleep 2
              if curl -sk https://localhost/health > /dev/null 2>&1; then
                echo "Yeti is healthy"
                curl -sk https://localhost/health
                exit 0
              fi
              if [ $((i % 30)) -eq 0 ]; then
                echo "  Still waiting... ($((i*2))s)"
              fi
            done
            echo "Health check failed after 6 minutes"
            journalctl -u yeti --no-pager -n 50
            exit 1
          REMOTE
